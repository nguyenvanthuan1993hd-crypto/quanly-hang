```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial;margin:20px;font-size:14px;}
input,select,textarea,button{padding:5px;font-size:13px;margin:4px;}

#formContainer{
display:flex;
flex-direction:column;
gap:5px;
margin-bottom:15px;
border:1px solid #ccc;
padding:10px;
background:#fafafa;
}

.form-row{display:flex;gap:10px;}

.form-row input,
.form-row select,
.form-row textarea{
flex:1;
padding:5px;
font-size:13px;
resize:none;
}

textarea#note{flex:2;}

.table-container{
max-height:300px;
overflow:auto;
border:1px solid #ccc;
}

.table-container table{
width:100%;
border-collapse:collapse;
}

.table-container th,
.table-container td{
border:1px solid #ccc;
padding:6px;
text-align:center;
white-space:pre-line;
word-break:break-word;
}

.table-container thead th{
position:sticky;
top:0;
background:#eee;
z-index:5;
}

.profit-positive{color:green;font-weight:bold;}
.profit-negative{color:red;font-weight:bold;}
.selected-row{background:#fff3cd !important;}
</style>
</head>

<body>

<h2>Quản lý</h2>

<button onclick="addItem()">➕ Thêm</button>
<button onclick="editSelected()">📝 Sửa</button>
<button onclick="copySelected()">📋 Copy</button>
<button onclick="deleteSelected()">❌ Xóa</button>
<button onclick="overwriteBackup()">💾 Backup</button>
<button onclick="restoreBackup()">Restore</button>
<button onclick="exportPDF()">PDF</button>
<button onclick="exportExcel()">Excel</button>
<button onclick="searchAll()">🔎 Kaitori</button>
<button onclick="syncGoogle()">☁ Sync Google</button>

<hr>

<div id="formContainer">

<div class="form-row">

<input type="date" id="buyDate">

<select id="account">
<option value="">Tài khoản</option>
<option>Chính</option>
<script>
for(let i=1;i<=50;i++){
document.write(`<option>Tài khoản ${i}</option>`);
}
</script>
</select>

<textarea id="jan" placeholder="JAN"></textarea>

<button onclick="startScan()">📷 Scan</button>

<textarea id="name" placeholder="Tên"></textarea>

</div>

<div id="reader" style="width:300px"></div>

<div class="form-row">

<input type="number" id="buyPrice" placeholder="Giá mua">
<input type="number" id="point" placeholder="Point">
<input type="number" id="quantity" placeholder="SL" value="1">
<input type="number" id="kaiBuyPrice" placeholder="Giá dự kiến">

</div>

<div class="form-row">

<input type="number" id="sellPrice" placeholder="Giá bán">

<select id="platform">
<option value="">Sàn</option>
<option>Yh</option>
<option>Amz</option>
<option>Rkt</option>
</select>

<input type="text" id="kai" placeholder="Bán cho">

<select id="status">
<option>Chưa bán</option>
<option>Đã bán</option>
<option>Đã hủy</option>
</select>

</div>

<div class="form-row">
<textarea id="note" placeholder="Ghi chú"></textarea>
</div>

</div>


<div id="exportArea">

<div class="table-container">

<table>

<thead>

<tr>
<th>✔</th>
<th>STT</th>
<th>Ngày</th>
<th>TK</th>
<th>JAN</th>
<th>Tên</th>
<th>Giá mua</th>
<th>Point</th>
<th>SL</th>
<th>Giá dự kiến</th>
<th>Giá bán</th>
<th>Tình trạng</th>
<th>LN dự kiến</th>
<th>LN thực</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<h3 id="summary"></h3>

</div>

<input type="file" id="restoreFile" style="display:none">

<script>

const url="https://script.google.com/macros/s/AKfycbwfBmqF-5X6frn_2Ey5kvJpVbmxZXHxdx6JLc9bpRdR7k3-5pnwLK-LxtWKN62b5w4Q1Q/exec";

let data=JSON.parse(localStorage.getItem("DATA_SAFE"))||[];
let editIndex=-1;

const tableBody=document.getElementById("tableBody");
const summary=document.getElementById("summary");

function calculateProfit(item){

let cost=item.buyPrice-item.point;

item.expectedProfit=(item.kaiBuyPrice-cost)*item.quantity;

item.realProfit=item.status==="Đã bán"
?(item.sellPrice-cost)*item.quantity
:0;

return item;

}

function saveLocal(){

localStorage.setItem("DATA_SAFE",JSON.stringify(data));

fetch(url,{
method:"POST",
body:JSON.stringify(data)
});

}

function addItem(){

let item={

buyDate:buyDate.value,
account:account.value,
jan:jan.value,
name:name.value,
buyPrice:Number(buyPrice.value),
point:Number(point.value),
quantity:Number(quantity.value),
kaiBuyPrice:Number(kaiBuyPrice.value),
sellPrice:Number(sellPrice.value)||0,
status:status.value

};

item=calculateProfit(item);

data.unshift(item);

saveLocal();

renderTable();

}

function renderTable(){

tableBody.innerHTML="";

let totalReal=0;
let totalExpected=0;

data.forEach((item,i)=>{

item=calculateProfit(item);

totalReal+=item.realProfit;
totalExpected+=item.expectedProfit;

tableBody.innerHTML+=`

<tr>

<td><input type="checkbox" class="rowCheck" value="${i}"></td>
<td>${i+1}</td>
<td>${item.buyDate}</td>
<td>${item.account}</td>
<td>${item.jan}</td>
<td>${item.name}</td>
<td>${item.buyPrice}</td>
<td>${item.point}</td>
<td>${item.quantity}</td>
<td>${item.kaiBuyPrice}</td>
<td>${item.sellPrice}</td>
<td>${item.status}</td>
<td>${item.expectedProfit}</td>
<td>${item.realProfit}</td>

</tr>

`;

});

summary.innerHTML=
"LN dự kiến: "+totalExpected+" | LN thực: "+totalReal;

}

function getSelectedIndex(){

let c=document.querySelector(".rowCheck:checked");

if(!c){alert("Chọn dòng");return null;}

return Number(c.value);

}

function editSelected(){

let i=getSelectedIndex();

if(i===null)return;

let item=data[i];

buyDate.value=item.buyDate;
account.value=item.account;
jan.value=item.jan;
name.value=item.name;
buyPrice.value=item.buyPrice;
point.value=item.point;
quantity.value=item.quantity;
kaiBuyPrice.value=item.kaiBuyPrice;
sellPrice.value=item.sellPrice;
status.value=item.status;

editIndex=i;

}

function copySelected(){

let i=getSelectedIndex();

if(i===null)return;

data.unshift({...data[i]});

saveLocal();
renderTable();

}

function deleteSelected(){

let i=getSelectedIndex();

if(i===null)return;

data.splice(i,1);

saveLocal();
renderTable();

}

function overwriteBackup(){

let blob=new Blob([JSON.stringify(data,null,2)]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="backup.json";

a.click();

}

const restoreFile=document.getElementById("restoreFile");

function restoreBackup(){
restoreFile.click();
}

restoreFile.addEventListener("change",function(){

let reader=new FileReader();

reader.onload=e=>{

data=JSON.parse(e.target.result);

saveLocal();

renderTable();

};

reader.readAsText(this.files[0]);

});

async function exportPDF(){

const {jsPDF}=window.jspdf;

let canvas=await html2canvas(exportArea);

let pdf=new jsPDF("l","mm","a4");

pdf.addImage(canvas.toDataURL("image/png"),"PNG",10,10,280,canvas.height*280/canvas.width);

pdf.save("report.pdf");

}

function exportExcel(){

let ws=XLSX.utils.json_to_sheet(data);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"data");

XLSX.writeFile(wb,"report.xlsx");

}

function searchAll(){

let code=jan.value;

window.open("https://kaitori.app/#"+code);
window.open("https://gamekaitori.jp/search?q="+code);
window.open("https://www.kaitorishouten-co.jp/#"+code);

}

function startScan(){

const scanner=new Html5Qrcode("reader");

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
(code)=>{

jan.value=code;

scanner.stop();

document.getElementById("reader").innerHTML="";

}
);

}

function syncGoogle(){

fetch(url,{
method:"POST",
body:JSON.stringify(data)
});

}

async function loadGoogle(){

try{

let res=await fetch(url);

let json=await res.json();

if(json.length){

data=json;

localStorage.setItem("DATA_SAFE",JSON.stringify(data));

renderTable();

}

}catch(e){}

}

loadGoogle();

renderTable();

</script>

</body>
</html>
```
